<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Green Shop - ReFashion</title>
  <meta name="description" content="ReFashion - Circular fashion ecosystem connecting buyers, upcycle designers, and administrators.">
  <meta property="og:title" content="ReFashion - Circular & Sustainable Fashion">
  <meta property="og:description" content="Circular fashion ecosystem connecting buyers, upcycle designers, and administrators.">
  <link rel="stylesheet" href="../css/maincss.css?v=2" />
  <link rel="stylesheet" href="../css/buyer.css?v=2" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
  <div id="navbar-container"></div>

  <main class="page-main">
    <section class="shop-section">
      <div class="container">
        <div class="shop-header">
          <span class="badge badge-primary" style="margin-bottom:0.5rem">Green Collection</span>
          <h1>Sustainable Fashion Shop</h1>
          <p style="color:var(--text-muted);font-size:1rem;margin-top:0.5rem">Showing <strong id="shop-result-count">0</strong> eco-friendly products</p>
        </div>

        <div class="shop-layout">
          <aside class="shop-sidebar">
            <div class="filter-card">
              <div class="filter-section">
                <h3>Category</h3>
                <div class="filter-radio-group">
                  <label><input type="radio" name="category" value="all" checked /><span>All</span></label>
                  <label><input type="radio" name="category" value="upper" /><span>Tops</span></label>
                  <label><input type="radio" name="category" value="lower" /><span>Bottoms</span></label>
                  <label><input type="radio" name="category" value="overall" /><span>Outfits</span></label>
                </div>
              </div>
            </div>

            <div class="filter-card">
              <div class="filter-section" id="filter-shop-section">
                <h3>Shop</h3>
                <div class="filter-radio-group" id="filter-shop-group">
                </div>
              </div>
            </div>
          </aside>

          <div style="flex: 1;">
            <div class="shop-toolbar">
              <div class="shop-toolbar-search" style="flex:1; max-width:550px; min-width:280px; position:relative;">
                <div class="filter-search-wrap">
                  <i class="fa-solid fa-magnifying-glass"></i>
                  <input type="text" id="filter-search" placeholder="Search eco-products..." autocomplete="off" style="padding-right: 5rem;" />
                  <button id="voice-search-btn" class="voice-search-btn" title="Search by voice" style="position:absolute; right:2.2rem; top:50%; transform:translateY(-50%); background:transparent; border:none; color:var(--text-muted); cursor:pointer; font-size:1.05rem; transition:color 0.2s;"><i class="fa-solid fa-microphone"></i></button>
                  <button id="filter-search-clear" class="filter-clear-btn" style="display:none; position:absolute; right:0.7rem; top:50%; transform:translateY(-50%); background:transparent; border:none; color:var(--text-muted); cursor:pointer;"><i class="fa-solid fa-xmark"></i></button>
                </div>
                <div id="search-suggestions-dropdown" class="search-suggestions-dropdown" style="display:none; position:absolute; top:calc(100% + 8px); left:0; right:0; background:rgba(255,255,255,0.98); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); border:1px solid var(--border); border-radius:14px; box-shadow:0 12px 35px rgba(0,0,0,0.1); z-index:1000; max-height:350px; overflow-y:auto; padding:0.5rem 0;"></div>
              </div>
              <div class="shop-toolbar-actions" style="display:flex; align-items:center; gap:1.5rem; flex-wrap:wrap;">
                <div class="result-count" id="shop-result-label" style="font-size:0.95rem; color:var(--text-muted);"></div>
                <div class="sort-group" style="display:flex; align-items:center; gap:0.75rem;">
                  <select id="shop-sort">
                    <option value="default">Default Sorting</option>
                    <option value="ai-rec">ReFashion Style Match</option>
                    <option value="price-asc">Price: Low to High</option>
                    <option value="price-desc">Price: High to Low</option>
                  </select>
                  <button id="filter-reset" class="btn btn-outline" style="border-radius:12px;font-size:0.9rem;padding:0.55rem 1.2rem"><i class="fa-solid fa-arrow-rotate-left" style="margin-right:0.35rem"></i>Reset</button>
                </div>
              </div>
            </div>
            <div id="shop-banner-container" style="margin-bottom: 1.5rem;"></div>
            <div class="product-grid" id="shop-product-grid"></div>
            <div id="shop-pagination" style="margin-top: 2rem; display: flex; justify-content: center; gap: 0.5rem; align-items: center; flex-wrap: wrap;"></div>

            <!-- Partner Logos Section -->
            <div class="partner-logos-section" style="margin-top: 3rem; padding-top: 1.5rem; border-top: 1px solid var(--border);">
              <div style="text-align: center; margin-bottom: 1rem;">
                <span class="badge badge-accent" style="margin-bottom: 0.75rem; font-size: 0.85rem;">Partners</span>
                <h3 style="font-family: var(--font-serif); font-size: 2rem; color: var(--primary); font-weight: 700;">Prominent Eco-Stores</h3>
                <p style="color: var(--text-muted); font-size: 1rem; margin-top: 0.5rem;">Discover verified sustainable sellers in our network</p>
              </div>
              <div id="featured-stores-grid" class="partner-logos-grid"></div>
            </div>
        </div>
      </div>
    </section>
  </main>

  <div id="footer-container"></div>

  <script src="../js/mainjs.js?v=2"></script>
  <script src="../js/buyer.js?v=2"></script>
  <script src="../js/ai-recommend.js?v=2"></script>
</body>
</html>
