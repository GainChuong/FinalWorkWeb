  <meta name="description" content="ReFashion - Hệ sinh thái thời trang tuần hoàn kết nối người mua, nhà thiết kế tái sinh và quản trị viên minh bạch.">
  <meta property="og:title" content="ReFashion - Thời trang Tái sinh & Bền vững">
  <meta property="og:description" content="Hệ sinh thái thời trang tuần hoàn kết nối người mua, nhà thiết kế tái sinh và quản trị viên minh bạch.">

            <nav>
                <ul>

                    <li><a href="#">Shop</a></li>
                    <li><a href="#">Community</a></li>

                    <li><a href="#">About Us</a></li>
                    <li><a href="#">Contact</a></li>
                </ul>
            </nav>

            <div class="nav-actions">
                <i class="fas fa-search"></i>

                <a href="../auth/login.html">
                    <button class="btn-outline">Sign In</button>
                </a>

                <a href="../auth/register.html">
                    <button class="btn-primary">Sign Up</button>
                </a>
            </div>
        </header>

        <!-- HERO -->

        <section class="hero">
            <div class="hero-content">
                <h1>
                    Wear Better.<br />
                    Waste Less.
                </h1>

                <p>
                    Sustainable fashion platform for buying, donating and
                    transforming pre-loved clothes.
                </p>

            <div class="gallery">
                <div class="card tall">
                    <img src="../images/fashion1.jpg" alt="Sustainable Fashion Model 1" />
                </div>

                <div class="card tall">
                    <img src="../images/fashion2.jpg" alt="Sustainable Fashion Model 2" />
                </div>

                <div class="card center-card">
                    <img src="../images/fashion3.jpg" alt="Featured Recycled Clothing" />

                    <button class="explore-btn">Explore More →</button>
                </div>

                <div class="card tall">
                    <img src="../images/fashion4.jpg" alt="Sustainable Fashion Model 3" />

                <div class="card tall">
                    <img src="../images/fashion5.jpg" alt="Sustainable Fashion Model 4" />
                </div>
            </div>

            <div class="impact">
                <div class="impact-box">
                    <h2>12,450+</h2>
                    <p>Clothes Reused</p>
                </div>

                <div class="impact-box">
                    <h2>3.2 Tons</h2>
                    <p>CO₂ Saved</p>
                </div>

                <div class="impact-box">
                    <h2>8M Liters</h2>
                    <p>Water Saved</p>
                </div>
